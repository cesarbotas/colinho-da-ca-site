services:
  front:
    build:
      context: .
      dockerfile: Dockerfile.vps
    container_name: colinho-front
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    networks:
      - colinho-network

  certbot:
    image: certbot/certbot
    container_name: colinho-certbot
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - colinho-network

volumes:
  certbot-conf:
  certbot-www:

networks:
  colinho-network:
    external: true
